<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Special</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
		<link rel="stylesheet" href="styles.css" />
		<link
			rel="icon"
			href="data:image/svg+xml,
		<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
			<text x='50%' y='50%' text-anchor='middle' dominant-baseline='central' font-size='56'>
				❤️‍🔥
			</text>
		</svg>"
		/>
	</head>
	<body>
		<div id="heart-container"></div>
		<div class="center-wrapper">
			<div id="chat-wrapper" class="center middle-content">
				<div id="chat-background-blur"></div>
				<div id="chat"></div>
			</div>
		</div>
		<div class="center-wrapper" id="loading">
			<div class="center" style="width: fit-content; margin-top: 200px">
				<div class="spinner-border text-primary" role="status">
					<span class="visually-hidden">Loading...</span>
				</div>
			</div>
		</div>

		<div id="form-wrapper" class="sticky-bottom middle-content">
			<form id="main-form">
				<div class="mb-3">
					<input
						class="form-control custom-glow"
						id="seedText"
						placeholder="thương bé hong"
					/>
					<div class="form-text"></div>
				</div>

				<div class="center-wrapper">
					<div class="d-flex center">
						<div>Randomness:</div>
						<input
							type="range"
							class="form-range"
							id="temperature-range"
							min="0.1"
							max="1.3"
							value="0.1"
							step="0.001"
							style="margin-left: 20px"
						/>
					</div>
				</div>
			</form>
		</div>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
			integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
			integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
			crossorigin="anonymous"
		></script>
		<script type="module" src="main.js"></script>
	</body>
</html>
